<!-- Rock Paper Scissors Game 
set humanScore and computerScore to 0
set choices to "rock", "paper", and "scissors"

repeat 5 times:

    computer chooses randomly from the 3 choices
    user is prompted to enter their choice of the 3

    if user wins, humanScore increases
    if computer wins, computerScore increases
    if it's a tie, neither score increases

after 5 rounds, the final score is displayed and the winner is announced.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <style>
      /* Basic styling to make the UI look clean */
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
      }
      #results-container {
        margin-top: 30px;
        font-size: 1.2rem;
      }
      #game-winner {
        font-size: 1.5rem;
        font-weight: bold;
        color: #2e7d32; /* Dark green */
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <h1>Rock, Paper, Scissors</h1>
    <p>First to 5 points wins!</p>

    <div id="buttons">
      <button id="rock">Rock</button>
      <button id="paper">Paper</button>
      <button id="scissors">Scissors</button>
    </div>

    <div id="results-container">
      <p id="round-result">Make your choice to start the game!</p>
      <p>
        <strong>Score:</strong> You: <span id="human-score">0</span> | Computer:
        <span id="computer-score">0</span>
      </p>
      <div id="game-winner"></div>
    </div>

    <script>
      // State variables to keep track of the running score
      let humanScore = 0;
      let computerScore = 0;
      const choices = ["rock", "paper", "scissors"];

      // DOM Element references
      const rockBtn = document.getElementById("rock");
      const paperBtn = document.getElementById("paper");
      const scissorsBtn = document.getElementById("scissors");
      const roundResultDiv = document.getElementById("round-result");
      const humanScoreDisplay = document.getElementById("human-score");
      const computerScoreDisplay = document.getElementById("computer-score");
      const gameWinnerDiv = document.getElementById("game-winner");

      function getComputerChoice() {
        const randomIndex = Math.floor(Math.random() * choices.length);
        return choices[randomIndex];
      }

      // 3. Reworked playRound function to use DOM methods instead of console.logs
      function playRound(humanChoice) {
        // Stop playing if someone has already won
        if (humanScore >= 5 || computerScore >= 5) return;

        const computerChoice = getComputerChoice();

        // Determine the round winner and update the text
        if (humanChoice === computerChoice) {
          roundResultDiv.textContent = `It's a tie! You both chose ${humanChoice}.`;
        } else if (
          (humanChoice === "rock" && computerChoice === "scissors") ||
          (humanChoice === "paper" && computerChoice === "rock") ||
          (humanChoice === "scissors" && computerChoice === "paper")
        ) {
          roundResultDiv.textContent = `You win this round! ${humanChoice} beats ${computerChoice}.`;
          humanScore++;
        } else {
          roundResultDiv.textContent = `Computer wins this round! ${computerChoice} beats ${humanChoice}.`;
          computerScore++;
        }

        // 4. Display the running score
        humanScoreDisplay.textContent = humanScore;
        computerScoreDisplay.textContent = computerScore;

        // 5. Announce a winner once one player reaches 5 points
        checkWinner();
      }

      function checkWinner() {
        if (humanScore === 5) {
          gameWinnerDiv.textContent = "🏆 Congratulations! You won the game!";
          disableButtons();
        } else if (computerScore === 5) {
          gameWinnerDiv.textContent = "💀 Game Over. The computer won.";
          disableButtons();
        }
      }

      // Optional: Disable buttons after the game ends so the score stops going up
      function disableButtons() {
        rockBtn.disabled = true;
        paperBtn.disabled = true;
        scissorsBtn.disabled = true;
      }

      // 6. Add event listeners to the buttons to call playRound
      rockBtn.addEventListener("click", () => playRound("rock"));
      paperBtn.addEventListener("click", () => playRound("paper"));
      scissorsBtn.addEventListener("click", () => playRound("scissors"));
    </script>
  </body>
</html>
