<!-- Rock Paper Scissors Game 
set humanScore and computerScore to 0
set choices to "rock", "paper", and "scissors"

repeat 5 times:

    computer chooses randomly from the 3 choices
    user is prompted to enter their choice of the 3

    if user wins, humanScore increases
    if computer wins, computerScore increases
    if it's a tie, neither score increases

after 5 rounds, the final score is displayed and the winner is announced.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>

<body>
    <h1>Open Console!</h1>
    <script>
        const choices = ['rock', 'paper', 'scissors'];
        function getComputerChoice() {
            const randomIndex = Math.floor(Math.random() * choices.length);
            return choices[randomIndex];
        }
        function getHumanChoice() {
            while (true) {
                const userInput = prompt("Please choose rock, paper, or scissors:");

                // If user clicks "Cancel"
                if (userInput === null) {
                    console.log("Game cancelled by user.");
                    return null;
                }

                const choice = userInput.trim().toLowerCase();

                if (choices.includes(choice)) {
                    return choice;
                } else {
                    alert("Invalid choice. Please check your spelling and try again.");
                }
            }
        }

        function playRound(humanChoice, computerChoice) {
            console.log(`You chose: ${humanChoice}`);
            console.log(`Computer chose: ${computerChoice}`);

            if (humanChoice === computerChoice) {
                console.log("It's a tie!");
                return "tie";
            } else if (
                (humanChoice === 'rock' && computerChoice === 'scissors') ||
                (humanChoice === 'paper' && computerChoice === 'rock') ||
                (humanChoice === 'scissors' && computerChoice === 'paper')
            ) {
                console.log("You win this round!");
                return "human";
            } else {
                console.log("Computer wins this round!");
                return "computer";
            }
        }
        function playGame() {
            let humanScore = 0;
            let computerScore = 0;

            console.log("Starting a 5-round game of Rock, Paper, Scissors!");

            for (let i = 0; i < 5; i++) {
                console.log(`\n Round ${i + 1} of 5:`);
                const humanChoice = getHumanChoice();

                // Exit the whole game loop if the user clicked cancel
                if (!humanChoice) {
                    console.log("Exiting game...");
                    return;
                }

                const computerChoice = getComputerChoice();
                const roundWinner = playRound(humanChoice, computerChoice);

                if (roundWinner === "human") {
                    humanScore++;
                } else if (roundWinner === "computer") {
                    computerScore++;
                }
                console.log(`Current Score - You: ${humanScore}, Computer: ${computerScore}\n`);
            }

            if (humanScore > computerScore) {
                console.log(`You won the game ${humanScore} to ${computerScore}!`);
            } else if (computerScore > humanScore) {
                console.log(`Game over: Computer won ${computerScore} to ${humanScore}.`);
            } else {
                console.log(`Tied ${humanScore} to ${computerScore}!`);
            }
        }
        playGame();
    </script>
</body>

</html>
